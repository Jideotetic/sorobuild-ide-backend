services:
  sorobuild-ide-server:
    platform: linux/amd64
    build:
      context: .
      platforms:
        - linux/amd64
    image: sorobuild-ide-server
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - ./projects:/app/projects
      - ./temps:/app/temps
    restart: always

volumes:
  projects_data:
  temps_data:

